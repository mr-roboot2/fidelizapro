# ──────────────────────────────────────────────────────────────────────────
# nginx-storage.conf — snippet de hardening para servidores Nginx
# ──────────────────────────────────────────────────────────────────────────
#
# Objetivo: bloquear execução de scripts em /storage/* (uploads de logo,
# fotos, recompensas, sorteios, tutoriais) e impedir acesso direto a
# arquivos sensíveis do projeto.
#
# Equivalente Nginx do `storage/app/public/.htaccess` que vai no repo —
# o `.htaccess` é ignorado pelo Nginx, então a proteção em-profundidade
# precisa estar configurada aqui.
#
# COMO USAR:
#
#   1. Copie os blocos abaixo para dentro do bloco `server { ... }` do
#      vhost FidelizaPro (ex: /etc/nginx/sites-available/fidelizapro,
#      /etc/nginx/conf.d/*.conf, ou via painel CloudPanel/CyberPanel).
#
#   2. Coloque-os ANTES do `location ~ \.php$ { ... fastcgi ... }` para
#      que tenham precedência sobre o handler PHP.
#
#   3. Teste e recarregue:
#        sudo nginx -t
#        sudo systemctl reload nginx
#
# ──────────────────────────────────────────────────────────────────────────

# 1) Bloqueia execução de scripts em /storage/* (uploads do usuário).
#    Cobre polyglot PNG+PHP, SVG com <script>, .phtml, .phar, etc.
location ~ ^/storage/.*\.(php|phtml|phar|html?|svg|cgi|pl|py|asp|aspx|sh|exe)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 2) Desabilita listagem de diretório em /storage/.
location /storage/ {
    autoindex off;
}

# 3) Nega acesso a arquivos dot-files e de projeto que não deveriam vazar.
#    .env, .git/, composer.json, package.json, README.md, etc.
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|artisan|phpunit\.xml|README\.md|\.env.*)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 4) Nega execução de PHP em /public/build/ e /public/storage/
#    (mesmo motivo do bloco 1, mas explícito caso o path mude).
location ~ ^/(build|storage)/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}
